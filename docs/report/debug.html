<!doctype html><meta charset="utf-8"><title>Report Debug</title>
<body style="font:16px system-ui;margin:24px">
<h2>Report fetch debug</h2>
<p id="u"></p><pre id="o" style="white-space:pre-wrap"></pre>
<script>
const url = new URLSearchParams(location.search).get("report") || "/reports/sample.json";
document.getElementById("u").textContent = "Fetching: " + url;
fetch(url).then(async r => {
  document.getElementById("o").textContent =
    "status: " + r.status + "\n" +
    "ok: " + r.ok + "\n\n" +
    (r.ok ? JSON.stringify(await r.json(), null, 2) : await r.text());
}).catch(e => document.getElementById("o").textContent = "ERROR: " + e);
</script>
</body>
